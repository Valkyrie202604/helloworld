name: Build Luci App SSR Plus

on:
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download SDK
        run: |
          # 针对 qualcommax/ipq807x 的官方 SDK 地址
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/qualcommax/ipq807x/immortalwrt-sdk-24.10.2-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget $SDK_URL
          tar -xf *.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Update and Install Feeds
        working-directory: ./sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add Plugin Source
        working-directory: ./sdk
        run: |
          # 使用 Method 3 推荐的方式添加源码
          echo "src-git helloworld https://github.com/Valkyrie202604/helloworld.git" >> feeds.conf.default
          ./scripts/feeds update helloworld
          ./scripts/feeds install -a -p helloworld

      - name: Configuration
        working-directory: ./sdk
        run: |
          # 选中你需要编译的插件，这里根据你的路径指向 luic-app-ssr-plus
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" >> .config
          # 如果需要特定的依赖也可以在此添加，例如：
          # echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Libev_Client=y" >> .config
          make defconfig

      - name: Compile Plugin
        working-directory: ./sdk
        run: |
          # 使用多线程编译提高效率
          make package/feeds/helloworld/luci-app-ssr-plus/compile V=s -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ssr-plus-ipk
          path: sdk/bin/packages/aarch64_cortex-a53/helloworld/*.ipk
