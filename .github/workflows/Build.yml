name: Build Luci App SSR Plus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget zstd

      - name: Download SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/qualcommax/ipq807x/immortalwrt-sdk-24.10.2-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget $SDK_URL
          mkdir sdk
          tar -xf *.tar.zst -C sdk --strip-components=1
          rm *.tar.zst

      - name: Update and Install Feeds
        working-directory: ./sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add Plugin Source
        working-directory: ./sdk
        run: |
          # 移除可能存在的旧定义，确保使用你的仓库源
          sed -i '/helloworld/d' feeds.conf.default
          echo "src-git helloworld https://github.com/Valkyrie202604/helloworld.git" >> feeds.conf.default
          ./scripts/feeds update helloworld
          # -f 强制覆盖，-p 指定安装 helloworld feed
          ./scripts/feeds install -a -f -p helloworld

      - name: Configuration
        working-directory: ./sdk
        run: |
          # 写入配置并让 SDK 自动展开依赖链
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" > .config
          make defconfig

      - name: Compile Plugin
        working-directory: ./sdk
        run: |
          # 首先尝试多线程编译
          # 如果失败，自动切换到单线程编译以暴露核心错误
          make package/feeds/helloworld/luci-app-ssr-plus/compile V=s -j$(nproc) || \
          make package/feeds/helloworld/luci-app-ssr-plus/compile V=s -j1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ssr-plus-ipk
          path: |
            sdk/bin/packages/aarch64_cortex-a53/helloworld/*.ipk
