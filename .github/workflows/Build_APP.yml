name: Build ssr-plus for IPQ807x ARMv8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget zstd

      - name: Download and Setup SDK
        run: |
          # 确定为 24.10.2 的 ipq807x SDK
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.2/targets/qualcommax/ipq807x/immortalwrt-sdk-24.10.2-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO sdk.tar.zst "$SDK_URL"
          
          # 核心修复：创建目录并直接解压，剥离一层目录防止 mv 错误
          mkdir openwrt-sdk
          zstd -d sdk.tar.zst --stdout | tar -x -C openwrt-sdk --strip-components=1

      - name: Update and Install Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add luci-app-ssr-plus
        run: |
          cd openwrt-sdk/package
          # 克隆插件源码到 custom 目录
          git clone --depth=1 https://github.com/Valkyrie202604/helloworld.git custom
          # 修复 tcping 编译错误：删除 helloworld 里的旧版本，使用 feed 里的稳定版
          rm -rf custom/tcping

      - name: Configure and Build
        run: |
          cd openwrt-sdk
          make defconfig
          # 手动选中插件
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=m" >> .config
          # 补齐所有依赖 (Shadowsocks, V2ray 等)
          make defconfig
          
          # 编译
          make package/custom/luci-app-ssr-plus/compile V=s -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ssr-plus-ipq807x-24.10.2
          path: |
            openwrt-sdk/bin/targets/qualcommax/ipq807x/packages/*.ipk
            openwrt-sdk/bin/packages/aarch64_cortex-a53/custom/*.ipk
